---
- name: Créer les répertoires du reverse proxy
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /opt/proxy
    - /opt/proxy/certs
    - /opt/proxy/conf

- name: Générer un certificat auto-signé (bonus HTTPS)
  command: >
    openssl req -x509 -nodes -newkey rsa:2048
    -keyout /opt/proxy/certs/server.key
    -out /opt/proxy/certs/server.crt
    -days 365
    -subj "/C=FR/ST=IDF/O=DemoCloud/CN={{ app_public_name | default('demo.cloud.local') }}"
  args:
    creates: /opt/proxy/certs/server.crt

- name: Déposer la configuration NGINX
  template:
    src: default.conf.j2
    dest: /opt/proxy/conf/default.conf
    mode: "0644"

- name: Déposer le docker-compose du reverse proxy
  template:
    src: compose.yml.j2
    dest: /opt/proxy/compose.yml
    mode: "0644"

- name: Démarrer le reverse proxy
  command: docker compose up -d
  args:
    chdir: /opt/proxy
