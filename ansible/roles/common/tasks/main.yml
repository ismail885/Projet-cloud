---
- name: Installer les dépendances de base
  apt:
    name: [ca-certificates, curl, gnupg]
    state: present
    update_cache: true

- name: Créer le répertoire des clés APT
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Ajouter la clé GPG officielle de Docker
  get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Ajouter le dépôt Docker
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

- name: Installer Docker Engine et le plugin Compose
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Activer et démarrer Docker
  service:
    name: docker
    state: started
    enabled: true

- name: Ajouter l'utilisateur cloud au groupe docker
  user:
    name: cloud
    groups: docker
    append: true
